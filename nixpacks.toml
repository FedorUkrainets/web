# Этот файл использует backend-сервис (см. web/backend/nixpacks.toml для backend).
# Здесь — для FRONTEND-сервиса, если Root Directory = web/.
# Nixpacks сам детектит Vite: npm ci → npm run build → статика из dist/ через Caddy.
# Build-time env нужен: VITE_API_URL = https://<ваш-backend>.up.railway.app/api

providers = ["node"]

[phases.setup]
nixPkgs = ["nodejs_20", "npm-9_x"]

[phases.install]
cmds = ["npm ci || npm install"]

[phases.build]
cmds = ["npm run build"]

[start]
# vite preview слушает $PORT автоматически.
cmd = "npx vite preview --host 0.0.0.0 --port $PORT"
